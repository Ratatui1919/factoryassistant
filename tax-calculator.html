<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Налоговый калькулятор Словакия 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .calculator-card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { font-size: 24px; color: #1e293b; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        .sub { color: #64748b; margin-bottom: 25px; font-size: 14px; border-left: 3px solid #667eea; padding-left: 12px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #334155; }
        input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; transition: 0.2s; }
        input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .result-grid {
            display: grid;
            gap: 12px;
            margin: 25px 0;
            background: #f8fafc;
            padding: 20px;
            border-radius: 20px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .result-row:last-child { border-bottom: none; }
        .result-label { font-weight: 500; color: #475569; }
        .result-value { font-weight: 700; font-size: 18px; }
        .net { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 15px; border-radius: 16px; margin-top: 15px; text-align: center; }
        .net .label { font-size: 14px; opacity: 0.9; }
        .net .value { font-size: 32px; font-weight: 800; }
        .footer { margin-top: 25px; text-align: center; font-size: 12px; color: #94a3b8; }
        button {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: 500;
        }
        button:hover { background: #e2e8f0; }
        .note { background: #fef9c3; padding: 12px; border-radius: 12px; font-size: 12px; margin-top: 20px; color: #854d0e; }
    </style>
</head>
<body>
<div class="container">
    <div class="calculator-card">
        <h1><i class="fas fa-calculator" style="color: #667eea;"></i> Налоговый калькулятор</h1>
        <div class="sub">Словакия 2026 • Čistá mzda</div>
        
        <div class="input-group">
            <label><i class="fas fa-euro-sign"></i> Введите gross зарплату (€)</label>
            <input type="number" id="grossInput" value="1500" step="100">
        </div>
        
        <button onclick="calculate()"><i class="fas fa-chart-line"></i> Рассчитать</button>
        
        <div id="results"></div>
        
        <div class="note">
            <i class="fas fa-info-circle"></i> Ставки 2026: социалка 9.4%, медстрах 5%, необлагаемая часть €497.23. Налог 19% (до €5000), 25% (выше).
        </div>
        <div class="footer">
            <i class="fas fa-shield-alt"></i> Данные синхронизируются с админ-панелью
        </div>
    </div>
</div>

<script type="module">
    import { getSystemSettings, calculateNetSalary } from './modules/config.js';
    
    function calculate() {
        const gross = parseFloat(document.getElementById('grossInput').value);
        if (isNaN(gross)) return;
        
        const settings = getSystemSettings();
        const result = calculateNetSalary(gross, settings);
        
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = `
            <div class="result-grid">
                <div class="result-row">
                    <span class="result-label"><i class="fas fa-euro-sign"></i> Gross (hrubá mzda)</span>
                    <span class="result-value">${result.gross.toFixed(2)} €</span>
                </div>
                <div class="result-row">
                    <span class="result-label"><i class="fas fa-chart-line"></i> Социалка (9.4%)</span>
                    <span class="result-value">- ${result.social.toFixed(2)} €</span>
                </div>
                <div class="result-row">
                    <span class="result-label"><i class="fas fa-heartbeat"></i> Медстрах (5%)</span>
                    <span class="result-value">- ${result.health.toFixed(2)} €</span>
                </div>
                <div class="result-row">
                    <span class="result-label"><i class="fas fa-file-invoice-dollar"></i> Налоговая база</span>
                    <span class="result-value">${result.taxBase.toFixed(2)} €</span>
                </div>
                <div class="result-row">
                    <span class="result-label"><i class="fas fa-gift"></i> Необлагаемая часть</span>
                    <span class="result-value">- ${result.nonTaxable.toFixed(2)} €</span>
                </div>
                <div class="result-row">
                    <span class="result-label"><i class="fas fa-percent"></i> Налог (19/25%)</span>
                    <span class="result-value">- ${result.tax.toFixed(2)} €</span>
                </div>
            </div>
            <div class="net">
                <div class="label">Čistá mzda / Чистыми на руки</div>
                <div class="value">${result.net.toFixed(2)} €</div>
            </div>
        `;
    }
    
    window.calculate = calculate;
    calculate(); // Первый расчёт
</script>
</body>
</html>
