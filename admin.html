<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления - Калькулятор зарплаты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: #2c3e50;
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 30px;
        }
        
        .login-form {
            max-width: 400px;
            margin: 0 auto;
            text-align: center;
        }
        
        .login-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .login-form button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .login-form button:hover {
            background: #5a67d8;
        }
        
        .settings-panel {
            display: none;
        }
        
        .settings-group {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .settings-group h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }
        
        .setting {
            margin-bottom: 15px;
        }
        
        .setting label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .setting input, .setting select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .setting input:focus, .setting select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .checkbox-setting {
            display: flex;
            align-items: center;
        }
        
        .checkbox-setting label {
            margin-left: 10px;
            margin-bottom: 0;
        }
        
        .checkbox-setting input {
            width: auto;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-save {
            background: #27ae60;
            color: white;
            flex: 1;
        }
        
        .btn-save:hover {
            background: #229954;
        }
        
        .btn-reset {
            background: #e74c3c;
            color: white;
            flex: 1;
        }
        
        .btn-reset:hover {
            background: #c0392b;
        }
        
        .btn-logout {
            background: #95a5a6;
            color: white;
        }
        
        .message {
            padding: 15px;
            margin-top: 20px;
            border-radius: 8px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .info-text {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #004085;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚙️ Панель управления</h1>
            <p>Настройка коэффициентов калькулятора зарплаты</p>
        </div>
        
        <div class="content">
            <!-- Форма входа -->
            <div id="loginForm" class="login-form">
                <h3>Введите пароль для доступа</h3>
                <input type="password" id="passwordInput" placeholder="Пароль">
                <button onclick="login()">Войти</button>
            </div>
            
            <!-- Панель настроек -->
            <div id="settingsPanel" class="settings-panel">
                <div class="info-text">
                    🔐 Вы вошли как администратор. Все изменения сохраняются автоматически в браузере.
                </div>
                
                <form id="settingsForm">
                    <div class="settings-group">
                        <h3>💰 Основные ставки</h3>
                        <div class="setting">
                            <label>Базовая ставка (€/час)</label>
                            <input type="number" id="baseRate" step="0.5" value="15">
                        </div>
                        <div class="setting">
                            <label>Доплата за субботу (€/час)</label>
                            <input type="number" id="saturdayBonus" step="0.5" value="5">
                        </div>
                        <div class="setting">
                            <label>Воскресный коэффициент (× от ставки)</label>
                            <input type="number" id="sundayMultiplier" step="0.1" value="1.5">
                        </div>
                        <div class="setting">
                            <label>Ночной коэффициент (× от ставки)</label>
                            <input type="number" id="nightMultiplier" step="0.1" value="1.35">
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <h3>🎁 Бонусы</h3>
                        <div class="setting checkbox-setting">
                            <input type="checkbox" id="fixedBonusEnabled">
                            <label>Включить фиксированный бонус (25€)</label>
                        </div>
                        <div class="setting">
                            <label>Сумма фиксированного бонуса (€)</label>
                            <input type="number" id="fixedBonusAmount" step="5" value="25">
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <h3>⏰ Овертайм</h3>
                        <div class="setting">
                            <label>Порог овертайма (часов в неделю)</label>
                            <input type="number" id="overtimeThreshold" step="1" value="40">
                        </div>
                        <div class="setting">
                            <label>Коэффициент овертайма (× от ставки)</label>
                            <input type="number" id="overtimeMultiplier" step="0.1" value="1.5">
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <h3>🧾 Налоги и вычеты</h3>
                        <div class="setting">
                            <label>Налоговая ставка (%)</label>
                            <input type="number" id="taxRate" step="1" value="20">
                        </div>
                        <div class="setting">
                            <label>Социальное страхование (%)</label>
                            <input type="number" id="socialSecurityRate" step="1" value="10">
                        </div>
                    </div>
                    
                    <div class="settings-group">
                        <h3>➕ Дополнительные надбавки</h3>
                        <div class="setting">
                            <label>Доплата за вредность (€/час)</label>
                            <input type="number" id="hazardousWorkBonus" step="0.5" value="0">
                            <small>0 - отключено</small>
                        </div>
                        <div class="setting">
                            <label>Транспортные расходы (€/день)</label>
                            <input type="number" id="transportAllowance" step="1" value="0">
                            <small>0 - отключено</small>
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <button type="button" class="btn-save" onclick="saveAllSettings()">💾 Сохранить все настройки</button>
                        <button type="button" class="btn-reset" onclick="resetSettings()">🔄 Сбросить к стандартным</button>
                        <button type="button" class="btn-logout" onclick="logout()">🚪 Выйти</button>
                    </div>
                </form>
                
                <div id="message"></div>
            </div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        let currentPassword = '';
        
        function login() {
            const password = document.getElementById('passwordInput').value;
            
            if (checkAdminPassword(password)) {
                currentPassword = password;
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('settingsPanel').style.display = 'block';
                loadSettingsToForm();
                showMessage('✅ Доступ разрешён!', 'success');
            } else {
                showMessage('❌ Неверный пароль! Доступ запрещён.', 'error');
            }
        }
        
        function loadSettingsToForm() {
            const settings = getSettings();
            
            // Заполняем все поля
            document.getElementById('baseRate').value = settings.baseRate;
            document.getElementById('saturdayBonus').value = settings.saturdayBonus;
            document.getElementById('sundayMultiplier').value = settings.sundayMultiplier;
            document.getElementById('nightMultiplier').value = settings.nightMultiplier;
            document.getElementById('fixedBonusEnabled').checked = settings.fixedBonusEnabled;
            document.getElementById('fixedBonusAmount').value = settings.fixedBonusAmount;
            document.getElementById('overtimeThreshold').value = settings.overtimeThreshold;
            document.getElementById('overtimeMultiplier').value = settings.overtimeMultiplier;
            document.getElementById('taxRate').value = settings.taxRate * 100;
            document.getElementById('socialSecurityRate').value = settings.socialSecurityRate * 100;
            document.getElementById('hazardousWorkBonus').value = settings.hazardousWorkBonus;
            document.getElementById('transportAllowance').value = settings.transportAllowance;
        }
        
        function saveAllSettings() {
            try {
                const newSettings = {
                    baseRate: parseFloat(document.getElementById('baseRate').value),
                    saturdayBonus: parseFloat(document.getElementById('saturdayBonus').value),
                    sundayMultiplier: parseFloat(document.getElementById('sundayMultiplier').value),
                    nightMultiplier: parseFloat(document.getElementById('nightMultiplier').value),
                    fixedBonusEnabled: document.getElementById('fixedBonusEnabled').checked,
                    fixedBonusAmount: parseFloat(document.getElementById('fixedBonusAmount').value),
                    overtimeThreshold: parseFloat(document.getElementById('overtimeThreshold').value),
                    overtimeMultiplier: parseFloat(document.getElementById('overtimeMultiplier').value),
                    taxRate: parseFloat(document.getElementById('taxRate').value) / 100,
                    socialSecurityRate: parseFloat(document.getElementById('socialSecurityRate').value) / 100,
                    hazardousWorkBonus: parseFloat(document.getElementById('hazardousWorkBonus').value),
                    transportAllowance: parseFloat(document.getElementById('transportAllowance').value)
                };
                
                saveSettings(newSettings, currentPassword);
                showMessage('✅ Настройки успешно сохранены!', 'success');
                setTimeout(() => hideMessage(), 2000);
            } catch(e) {
                showMessage('❌ Ошибка: ' + e.message, 'error');
            }
        }
        
        function resetSettings() {
            if (confirm('Вы уверены, что хотите сбросить все настройки к стандартным?')) {
                try {
                    resetToDefaults(currentPassword);
                    loadSettingsToForm();
                    showMessage('🔄 Настройки сброшены к стандартным', 'success');
                    setTimeout(() => hideMessage(), 2000);
                } catch(e) {
                    showMessage('❌ Ошибка: ' + e.message, 'error');
                }
            }
        }
        
        function logout() {
            currentPassword = '';
            document.getElementById('settingsPanel').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('passwordInput').value = '';
            showMessage('👋 Вы вышли из панели управления', 'success');
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `message ${type}`;
        }
        
        function hideMessage() {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message';
        }
    </script>
</body>
</html>
